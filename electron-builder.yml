# Packaging config — `npm run dist` produces platform installers in release/.
appId: com.localscribe.app
productName: LocalScribe
directories:
  buildResources: build
  output: release
# Deletes the (unusably unprivileged) chrome-sandbox helper from Linux
# builds; see build/afterPack.js for why this is necessary in addition to
# the --no-sandbox switch in src/main/index.ts.
afterPack: build/afterPack.js
# 1024x1024 master; electron-builder derives .ico/.icns/per-size PNGs from it
# at package time. Without this key, Windows/Linux silently fall back to
# Electron's stock icon even if build/icon.png exists.
icon: build/icon.png
# Owner/repo are inferred from package.json's "repository" field.
# releaseType intentionally stays at the default (draft): the Linux and
# Windows CI jobs upload to the same draft concurrently, and the workflow's
# publish-release job flips it public once all assets are attached. A draft
# is never visible to end users, so don't remove that final publish step.
publish:
  provider: github
files:
  - out/**
  - resources/**
# Native modules and the ffmpeg binary cannot run from inside the asar archive.
asarUnpack:
  - '**/*.node'
  - node_modules/ffmpeg-static/**
# The whisper.cpp binary (built by scripts/setup-whisper.sh into vendor/whisper)
# ships next to the app as resources/bin/whisper-cli.
extraResources:
  - from: vendor/whisper
    to: bin
    filter: ['**/*']
mac:
  target: dmg
  category: public.app-category.productivity
  # Microphone access prompt text (required by macOS for getUserMedia).
  extendInfo:
    NSMicrophoneUsageDescription: LocalScribe records your microphone to transcribe speech locally.
win:
  target: nsis
  # app-builder-bin would auto-derive an .ico from icon.png but only embeds a
  # single 256x256 frame; ship our own multi-size one so small renders (16/32,
  # taskbar/Explorer) aren't just a downscale of the big one.
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
    - deb
  category: Utility
  synopsis: Local speech-to-text with whisper.cpp
deb:
  depends:
    - libappindicator3-1
