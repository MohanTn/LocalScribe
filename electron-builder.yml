# Packaging config — `npm run dist` produces platform installers in release/.
appId: com.localscribe.app
productName: LocalScribe
directories:
  buildResources: build
  output: release
# Owner/repo are inferred from package.json's "repository" field.
publish:
  provider: github
files:
  - out/**
  - resources/**
# Native modules and the ffmpeg binary cannot run from inside the asar archive.
asarUnpack:
  - '**/*.node'
  - node_modules/ffmpeg-static/**
# The whisper.cpp binary (built by scripts/setup-whisper.sh into vendor/whisper)
# ships next to the app as resources/bin/whisper-cli.
extraResources:
  - from: vendor/whisper
    to: bin
    filter: ['**/*']
mac:
  target: dmg
  category: public.app-category.productivity
  # Microphone access prompt text (required by macOS for getUserMedia).
  extendInfo:
    NSMicrophoneUsageDescription: LocalScribe records your microphone to transcribe speech locally.
win:
  target: nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
    - deb
  category: Utility
  synopsis: Local speech-to-text with whisper.cpp
