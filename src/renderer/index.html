<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>LocalScribe</title>
    <!-- Everything is local; the CSP forbids any remote content in the UI. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' blob:; script-src 'self' blob:; worker-src 'self' blob:"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
