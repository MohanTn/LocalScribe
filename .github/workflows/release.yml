name: Release

# Linux and Windows only for now — macOS build/signing is out of scope.
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Runs on every push (any branch) and every PR into main: catches
  # typecheck/build breakage and native-module (better-sqlite3) rebuild
  # failures per OS before anything reaches main.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxt-dev libxinerama-dev \
            libx11-xcb-dev libxkbcommon-dev libxkbcommon-x11-dev libxkbfile-dev
      - run: npm ci
      - run: npm run build
      - run: npm test

  # Runs only when main itself is updated (i.e. a PR just merged), never on
  # a feature-branch push. Bumps the patch version, commits it back to main,
  # and pushes the resulting tag — this is what build-and-release keys off.
  bump-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version bump commit + tag
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Bump patch version and tag
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch -m "chore(release): %s [skip ci]"
          tag="v$(node -p "require('./package.json').version")"
          git push origin HEAD:main
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  # Builds the whisper.cpp CLI for each OS, packages the installer, and
  # uploads it to a shared *draft* GitHub Release via electron-builder's
  # built-in GitHub provider (see electron-builder.yml), using the tag
  # bump-version just cut. publish-release below flips the draft public.
  build-and-release:
    needs: bump-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: win
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # electron-builder creates/updates the GitHub Release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxt-dev libxinerama-dev \
            libx11-xcb-dev libxkbcommon-dev libxkbcommon-x11-dev libxkbfile-dev
      - run: npm ci
      - name: Build whisper.cpp
        shell: bash
        run: ./scripts/setup-whisper.sh
      - run: npm run release:${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # electron-builder uploads assets to a draft release (invisible to anyone
  # without write access to the repo). Publish it only after every platform's
  # installer is attached, so the public release is never half-populated and
  # the .deb/.exe/.AppImage are downloadable by everybody without logging in.
  publish-release:
    needs: [bump-version, build-and-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write # flip the draft release to published
    steps:
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.bump-version.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --draft=false --latest
